[tool.pytest.ini_options]
pythonpath = ['.']
testpaths = ['tests']
addopts = '-q'

[tool.ruff]
line-length = 100
target-version = 'py312'

[tool.ruff.lint]
select = ['E', 'F', 'I', 'UP', 'B']

[tool.ruff.lint.per-file-ignores]
'app/api/routes/*.py' = ['B008']
'app/models/*.py' = ['UP007']

[tool.ruff.format]
quote-style = 'double'
indent-style = 'space'
